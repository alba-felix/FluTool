<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- 背景白底圆角方形（Windows图标风格） -->
  <rect width="48" height="48" rx="6" fill="#0178D4"/>

  <!-- 齿轮外齿（8个） -->
  <g fill="#FFFFFF">
    <!-- 上 -->
    <rect x="22" y="8" width="4" height="8" rx="2"/>
    <!-- 右上 -->
    <rect x="31" y="12" width="8" height="4" rx="2" transform="rotate(45 35 14)"/>
    <!-- 右 -->
    <rect x="32" y="20" width="8" height="4" rx="2"/>
    <!-- 右下 -->
    <rect x="31" y="29" width="8" height="4" rx="2" transform="rotate(45 35 31)"/>
    <!-- 下 -->
    <rect x="22" y="32" width="4" height="8" rx="2"/>
    <!-- 左下 -->
    <rect x="9" y="29" width="8" height="4" rx="2" transform="rotate(45 13 31)"/>
    <!-- 左 -->
    <rect x="8" y="20" width="8" height="4" rx="2"/>
    <!-- 左上 -->
    <rect x="9" y="12" width="8" height="4" rx="2" transform="rotate(45 13 14)"/>
  </g>

  <!-- 齿轮中心圆 -->
  <circle cx="24" cy="24" r="8" fill="#FFFFFF"/>
  <circle cx="24" cy="24" r="5" fill="#0178D4"/>

  <!-- 右侧文档图标（代表策略/设置） -->
  <path d="M34 32 L34 40 L40 40 L40 32 L38 32 L38 34 L36 34 L36 32 L34 32Z" fill="#FFFFFF"/>
  <rect x="35" y="34" width="4" height="1.5" fill="#0178D4"/>
  <rect x="35" y="36" width="4" height="1.5" fill="#0178D4"/>
  <rect x="35" y="38" width="4" height="1.5" fill="#0178D4"/>
</svg>